apiVersion: v1
kind: ConfigMap
metadata:
  name: fdo-rendezvous-config
  namespace: astarte
data:
  DB_TYPE: "sqlite"
  DB_DSN: "file:/var/lib/fdo/db/rendezvous.db"
  LOG_LEVEL: "debug" # can be changed to "info" after testing
---
# FDO Rendezvous Server Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fdo-rendezvous
  namespace: astarte
  labels:
    app: fdo-rendezvous
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fdo-rendezvous
  template:
    metadata:
      labels:
        app: fdo-rendezvous
    spec:
      containers:
        - name: rendezvous
          image: "docker.io/astarte/go-fdo-server:ade68cda47-20251128@sha256:84a9ddb4653df09b95fb82e2c78f7b0d1b34d732ca85527cb79ee9256746ac2a"
          command:
            - "go-fdo-server"
            - "--log-level=$(LOG_LEVEL)"
            - "rendezvous"
            - "0.0.0.0:8041"
            - "--db-type=$(DB_TYPE)"
            - "--db-dsn=$(DB_DSN)"
          ports:
            - containerPort: 8041
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fdo-rendezvous-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8041
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8041
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          volumeMounts:
            - mountPath: /var/lib/fdo/db
              name: data
      volumes:
        - name: data
          emptyDir:
            sizeLimit: 500Mi
---
# FDO Rendezvous Service
apiVersion: v1
kind: Service
metadata:
  name: fdo-rendezvous
  namespace: astarte
  labels:
    app: fdo-rendezvous
spec:
  type: ClusterIP
  ports:
    - port: 8041
      targetPort: 8041
      protocol: TCP
      name: http
  selector:
    app: fdo-rendezvous
---
# Ingress for FDO Rendezvous Server
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fdo-rendezvous-ingress
  namespace: astarte
spec:
  ingressClassName: haproxy
  rules:
    - host: "rendezvous.localhost"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fdo-rendezvous
                port:
                  number: 8041
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    haproxy.org/backend-config-snippet: |
      http-request set-var(txn.subdomain) req.hdr(host),field(1,'.')
      http-request replace-path ^/(.*) /v1/%[var(txn.subdomain)]/\1
  labels:
    app.kubernetes.io/instance: secomind-app-astarte
  name: pairing-fdo-ingress
  namespace: astarte
spec:
  ingressClassName: haproxy
  rules:
    - host: "*.api.autotest.astarte-platform.org"
      http:
        paths:
          - backend:
              service:
                name: pairing-fdo
                port:
                  name: http
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - "*.api.autotest.astarte-platform.org"
      secretName: test-certificate
---
apiVersion: v1
kind: Service
metadata:
  name: pairing-fdo
  namespace: astarte
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 4000
      protocol: TCP
      targetPort: http
  selector:
    app: astarte-pairing
